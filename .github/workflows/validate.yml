name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build tooling image
        run: docker compose build infra
      - name: Validate public runbook
        run: scripts/validate-public.sh
