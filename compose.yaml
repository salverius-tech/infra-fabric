name: homelab-infra

services:
  infra:
    build:
      context: .
      dockerfile: tools/Dockerfile
    image: homelab-infra-tooling:local
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ${HOST_SSH_DIR:-${HOME}/.ssh}:/ssh-ro:ro
      - tofu-plugin-cache:/home/anvil/.terraform.d/plugin-cache
      - ansible-cache:/home/anvil/.ansible
    environment:
      TF_PLUGIN_CACHE_DIR: /home/anvil/.terraform.d/plugin-cache
      HOME: /home/anvil
      ANSIBLE_CONFIG: /workspace/ansible.cfg
      ANSIBLE_HOST_KEY_CHECKING: "true"
      INFRA_COPY_SSH_KEYS: ${INFRA_COPY_SSH_KEYS:-false}
      INFRA_HOST_UID: ${INFRA_HOST_UID:-1000}
      INFRA_HOST_GID: ${INFRA_HOST_GID:-1000}

volumes:
  tofu-plugin-cache:
  ansible-cache:
