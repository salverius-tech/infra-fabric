---
- name: Refresh Proxmox SSH trust before Technitium lifecycle checks
  ansible.builtin.import_playbook: proxmox-access-ready.yml
- name: Prepare Technitium DNS LXC lifecycle boundary
  hosts: pve
  gather_facts: false
  roles:
    - role: lxc_ready
      vars:
        lxc_ready_vmid: '{{ technitium_vmid }}'
        lxc_ready_name: technitium
      when: technitium_runtime.type | default('lxc') == 'lxc'
- name: Run direct access handoff for Technitium DNS
  ansible.builtin.import_playbook: direct-access-ready.yml
  vars:
    direct_access_ready_hosts: technitium
- name: Configure Technitium DNS service directly
  hosts: technitium
  gather_facts: false
  become: true
  roles:
    - technitium
