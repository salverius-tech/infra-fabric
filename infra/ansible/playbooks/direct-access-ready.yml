---
- name: Document reusable direct service access handoff
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Describe direct access handoff boundary
      ansible.builtin.debug:
        msg:
          - Proxmox guest lifecycle readiness runs before this handoff when required.
          - Controller-managed known_hosts is refreshed before direct service SSH.
          - Direct SSH, Python, and root/become probes run before steady-state roles.
          - Steady-state service configuration must not use Proxmox pct.

- name: Refresh direct service SSH trust on controller
  hosts: "{{ direct_access_ready_hosts | default('services') }}"
  gather_facts: false
  tasks:
    - name: Verify or enroll controller known_hosts for direct service endpoints  # noqa: run-once[task]
      ansible.builtin.shell: |
        set -euo pipefail
        host={{ hostvars[service_inventory_host].ansible_host | quote }}
        known_hosts={{ direct_access_ready_known_hosts_file | default('/workspace/values/ansible/known_hosts') | quote }}
        accept_change={{ direct_access_ready_accept_host_key_change | default(false) | bool | ternary('true', 'false') }}
        install -d -m 0700 "$(dirname "${known_hosts}")"
        touch "${known_hosts}"
        chmod 0600 "${known_hosts}"
        tmp="$(mktemp)"
        trap 'rm -f "${tmp}"' EXIT
        deadline=$((SECONDS + {{ direct_access_ready_ssh_scan_timeout | default(180) }}))
        until ssh-keyscan -T 10 -H -t rsa,ecdsa,ed25519 "${host}" > "${tmp}" 2>/dev/null && [ -s "${tmp}" ]; do
          if [ "${SECONDS}" -ge "${deadline}" ]; then
            echo "Timed out waiting for SSH host keys from direct service endpoint" >&2
            exit 1
          fi
          sleep 5
        done
        scanned="$(ssh-keygen -lf "${tmp}" | awk '{print $2}' | sort -u)"
        existing="$(ssh-keygen -F "${host}" -f "${known_hosts}" 2>/dev/null | ssh-keygen -lf - 2>/dev/null | awk '{print $2}' | sort -u || true)"
        if [ -z "${existing}" ]; then
          cat "${tmp}" >> "${known_hosts}"
          exit 0
        fi
        if [ "${existing}" != "${scanned}" ]; then
          if [ "${accept_change}" != true ]; then
            echo "SSH host key changed for ${host}; inspect the guest first." >&2
            echo "Then rerun with direct_access_ready_accept_host_key_change=true." >&2
            exit 1
          fi
          ssh-keygen -R "${host}" -f "${known_hosts}" >/dev/null
          cat "${tmp}" >> "${known_hosts}"
        fi
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: false
      run_once: true
      loop: "{{ ansible_play_hosts }}"
      loop_control:
        loop_var: service_inventory_host
      when:
        - hostvars[service_inventory_host].ansible_host is defined
        - hostvars[service_inventory_host].ansible_host | length > 0

- name: Verify direct service SSH and Python readiness
  hosts: "{{ direct_access_ready_hosts | default('services') }}"
  gather_facts: false
  tasks:
    - name: Wait for direct service SSH
      ansible.builtin.wait_for_connection:
        timeout: "{{ direct_access_ready_connection_timeout | default(180) }}"
    - name: Probe direct service Python execution
      ansible.builtin.ping:
    - name: Wait for VM cloud-init completion before steady-state roles
      ansible.builtin.command: cloud-init status --wait
      become: true
      register: direct_access_ready_cloud_init
      changed_when: false
      failed_when: direct_access_ready_cloud_init.rc not in [0, 2]
      when: service_runtime_current.type | default('lxc') == 'vm'
