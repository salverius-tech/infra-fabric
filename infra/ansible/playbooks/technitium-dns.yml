---
- name: Sync Technitium DNS records
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dns_records_file: "{{ lookup('env', 'DNS_RECORDS_FILE') | default('values/dns-records.local.json', true) }}"
  tasks:
    - name: Validate Technitium DNS environment
      ansible.builtin.assert:
        that:
          - lookup('env', 'TECHNITIUM_API_URL') | length > 0
          - lookup('env', 'TECHNITIUM_API_TOKEN') | length > 0
          - dns_records_file | length > 0
        fail_msg: TECHNITIUM_API_URL, TECHNITIUM_API_TOKEN, and DNS_RECORDS_FILE must be set for DNS sync
      no_log: true

    - name: Sync Technitium DNS records
      ansible.builtin.command:
        argv:
          - python3
          - infra/ansible/scripts/apply-technitium-dns.py
          - "{{ dns_records_file }}"
      register: technitium_dns_sync
      changed_when: "'upserted ' in technitium_dns_sync.stdout or 'created zone ' in technitium_dns_sync.stdout"
      retries: 10
      delay: 6
      until: technitium_dns_sync.rc == 0
