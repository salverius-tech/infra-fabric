---
- name: Configure Technitium DNS service
  ansible.builtin.import_playbook: technitium.yml
- name: Configure Technitium Caddy HTTPS proxy
  ansible.builtin.import_playbook: caddy-proxy.yml
- name: Sync Technitium DNS records
  ansible.builtin.import_playbook: technitium-dns.yml
- name: Configure Forgejo service
  ansible.builtin.import_playbook: forgejo.yml
- name: Configure Infisical service
  ansible.builtin.import_playbook: infisical.yml
- name: Configure Hermes management service
  ansible.builtin.import_playbook: hermes.yml
- name: Prepare Debian Podman onramp host for Onramp
  ansible.builtin.import_playbook: onramp-host.yml
- name: Configure Tailscale client
  ansible.builtin.import_playbook: tailscale-client.yml
