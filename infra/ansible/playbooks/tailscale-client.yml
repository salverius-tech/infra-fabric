---
- name: Prepare Tailscale client LXC lifecycle boundary
  hosts: pve
  gather_facts: false
  roles:
    - role: lxc_ready
      vars:
        lxc_ready_vmid: '{{ tailscale_client_vmid }}'
        lxc_ready_name: tailscale_client
      when: tailscale_client_runtime.type | default('lxc') == 'lxc'
- name: Run direct access handoff for Tailscale client
  ansible.builtin.import_playbook: direct-access-ready.yml
  vars:
    direct_access_ready_hosts: tailscale_client
- name: Configure Tailscale client directly
  hosts: tailscale_client
  gather_facts: false
  become: true
  roles:
    - tailscale_client
