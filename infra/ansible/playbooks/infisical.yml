---
- name: Prepare Infisical LXC lifecycle boundary
  hosts: pve
  gather_facts: false
  roles:
    - role: lxc_ready
      vars:
        lxc_ready_vmid: '{{ infisical_vmid }}'
        lxc_ready_name: infisical
      when: infisical_runtime.type | default('lxc') == 'lxc'
- name: Run direct access handoff for Infisical
  ansible.builtin.import_playbook: direct-access-ready.yml
  vars:
    direct_access_ready_hosts: infisical
- name: Configure Infisical service directly
  hosts: infisical
  gather_facts: false
  become: true
  roles:
    - infisical
