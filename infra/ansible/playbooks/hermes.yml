---
- name: Refresh Proxmox SSH trust before Hermes lifecycle checks
  ansible.builtin.import_playbook: proxmox-access-ready.yml
- name: Prepare Hermes management LXC lifecycle boundary
  hosts: pve
  gather_facts: false
  roles:
    - role: lxc_ready
      vars:
        lxc_ready_vmid: '{{ hermes_vmid }}'
        lxc_ready_name: hermes
      when: hermes_runtime.type | default('lxc') == 'lxc'
- name: Run direct access handoff for Hermes
  ansible.builtin.import_playbook: direct-access-ready.yml
  vars:
    direct_access_ready_hosts: hermes
- name: Configure Hermes management service directly
  hosts: hermes
  gather_facts: true
  become: true
  roles:
    - hermes
