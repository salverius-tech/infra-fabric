---
- name: Prepare Proxmox host storage
  hosts: pve
  gather_facts: false
  vars:
    storage_bind_mounts: []
  tasks:
    - name: Prepare requested host bind storage paths
      ansible.builtin.include_tasks: ../tasks/host-storage.yml
      loop: "{{ storage_bind_mounts }}"
      loop_control:
        loop_var: storage_bind_mount
        label: "{{ storage_bind_mount.name }}.{{ storage_bind_mount.mount }}"
