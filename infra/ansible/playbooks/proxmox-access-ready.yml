---
- name: Refresh Proxmox SSH trust before host lifecycle tasks
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Verify or enroll controller known_hosts for Proxmox  # noqa: run-once[task]
      ansible.builtin.shell: |
        set -euo pipefail
        host={{ hostvars['pve'].ansible_host | default('pve') | quote }}
        known_hosts={{ proxmox_access_ready_known_hosts_file | default('/workspace/values/ansible/known_hosts') | quote }}
        accept_change={{ proxmox_access_ready_accept_host_key_change | default(false) | bool | ternary('true', 'false') }}
        install -d -m 0700 "$(dirname "${known_hosts}")"
        touch "${known_hosts}"
        chmod 0600 "${known_hosts}"
        tmp="$(mktemp)"
        trap 'rm -f "${tmp}"' EXIT
        deadline=$((SECONDS + {{ proxmox_access_ready_ssh_scan_timeout | default(180) }}))
        until ssh-keyscan -T 10 -H -t rsa,ecdsa,ed25519 "${host}" > "${tmp}" 2>/dev/null && [ -s "${tmp}" ]; do
          if [ "${SECONDS}" -ge "${deadline}" ]; then
            echo "Timed out waiting for Proxmox SSH host keys" >&2
            exit 1
          fi
          sleep 5
        done
        scanned="$(ssh-keygen -lf "${tmp}" | awk '{print $2}' | sort -u)"
        existing="$(ssh-keygen -F "${host}" -f "${known_hosts}" 2>/dev/null | ssh-keygen -lf - 2>/dev/null | awk '{print $2}' | sort -u || true)"
        if [ -z "${existing}" ]; then
          cat "${tmp}" >> "${known_hosts}"
          exit 0
        fi
        if [ "${existing}" != "${scanned}" ]; then
          if [ "${accept_change}" != true ]; then
            echo "Proxmox SSH host key changed; inspect the host first." >&2
            echo "Then rerun with proxmox_access_ready_accept_host_key_change=true." >&2
            exit 1
          fi
          ssh-keygen -R "${host}" -f "${known_hosts}" >/dev/null
          cat "${tmp}" >> "${known_hosts}"
        fi
      args:
        executable: /bin/bash
      changed_when: false
      run_once: true
      when:
        - hostvars['pve'].ansible_host | default('pve') | length > 0
