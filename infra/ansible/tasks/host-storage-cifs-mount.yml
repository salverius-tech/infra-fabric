---
- name: Install host CIFS client packages
  ansible.builtin.apt:
    name: cifs-utils
    state: present
    update_cache: true

- name: Create host CIFS mountpoint
  ansible.builtin.file:
    path: "{{ storage_bind_mount.host_prepare.mountpoint }}"
    state: directory
    mode: "{{ storage_bind_mount.mode | default('0750') }}"

- name: Build host CIFS mount options
  ansible.builtin.set_fact:
    storage_host_mount_options: >-
      {{ (storage_bind_mount.host_prepare.options
          if (storage_bind_mount.host_prepare.options | default([]) | length > 0)
          else ['rw', '_netdev', 'nofail'])
         + ['credentials=' ~ storage_bind_mount.host_prepare.credentials_file] }}

- name: Manage host CIFS fstab entry
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^{{ ('//' ~ storage_bind_mount.host_prepare.server ~ '/' ~ storage_bind_mount.host_prepare.share) | regex_escape() }}\\s+"
    line: >-
      //{{ storage_bind_mount.host_prepare.server }}/{{ storage_bind_mount.host_prepare.share }}
      {{ storage_bind_mount.host_prepare.mountpoint }} cifs {{ storage_host_mount_options | join(',') }} 0 0
    mode: '0644'
    owner: root
    group: root

- name: Mount host CIFS storage
  ansible.builtin.command:
    argv:
      - mount
      - "{{ storage_bind_mount.host_prepare.mountpoint }}"
  register: storage_host_cifs_mount
  changed_when: storage_host_cifs_mount.rc == 0
  failed_when: storage_host_cifs_mount.rc not in [0, 32]

- name: Set host CIFS storage ownership
  ansible.builtin.file:
    path: "{{ storage_bind_mount.host_prepare.mountpoint }}"
    state: directory
    owner: "{{ storage_bind_mount.uid }}"
    group: "{{ storage_bind_mount.gid }}"
    mode: "{{ storage_bind_mount.mode | default('0750') }}"
