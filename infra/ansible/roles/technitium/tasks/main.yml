---
- name: Install Technitium prerequisites in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; missing=0; for package in curl ca-certificates dnsutils; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if ! dpkg-query -W libicu72 >/dev/null 2>&1 && ! dpkg-query -W libicu-dev >/dev/null 2>&1; then\n  missing=1;\nfi; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  (DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates dnsutils libicu72 ||\n  DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates dnsutils libicu-dev);\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Check Technitium service presence
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - systemctl list-unit-files dns.service >/dev/null 2>&1
  register: technitium_service_check
  changed_when: false
  failed_when: false
- name: Install Technitium DNS Server
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - curl -sSL https://download.technitium.com/dns/install.sh | bash
  when: technitium_service_check.rc != 0
- name: Ensure Technitium service is running
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - dns
  changed_when: false
- name: Verify Technitium service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - dns
  changed_when: false
  register: technitium_active
  retries: 6
  delay: 5
  until: technitium_active.rc == 0
- name: Verify Technitium UI responds on loopback
  ansible.builtin.uri:
    url: http://127.0.0.1:5380/
    status_code:
      - 200
      - 302
    return_content: false
  register: technitium_ui_check
  retries: 12
  delay: 5
  until: technitium_ui_check.status in [200, 302]
- name: Verify Technitium DNS answers loopback queries
  ansible.builtin.command:
    argv:
      - dig
      - +time=2
      - +tries=1
      - +short
      - '@127.0.0.1'
      - localhost
      - A
  changed_when: false
  register: technitium_dns_check
  retries: 6
  delay: 5
  until: technitium_dns_check.rc == 0 and technitium_dns_check.stdout | trim | length > 0
