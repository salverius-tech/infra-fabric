---
- name: Validate Caddy proxy variables
  ansible.builtin.assert:
    that:
      - technitium_vmid is defined
      - caddy_server_name is defined or caddy_server_names is defined
      - caddy_upstream is defined
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
    fail_msg: technitium_vmid, caddy_server_name or caddy_server_names, caddy_upstream, caddy_email, and caddy_cloudflare_api_token are required.
- name: Install Caddy build dependencies in DNS LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; packages=\"caddy ca-certificates curl\"; missing=0; for package in ${packages}; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Check whether DNS LXC Caddy has Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - caddy list-modules 2>/dev/null | grep -Fx dns.providers.cloudflare
  register: caddy_proxy_cloudflare_module
  changed_when: false
  failed_when: false
- name: Build DNS LXC Caddy with Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz -o /tmp/go.tar.gz && rm -rf /usr/local/go && tar -C /usr/local -xzf /tmp/go.tar.gz && PATH=/usr/local/go/bin:${PATH} GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest && PATH=/usr/local/go/bin:${PATH} /usr/local/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /tmp/caddy-cloudflare && install -m 0755 /tmp/caddy-cloudflare /usr/bin/caddy  # yamllint disable-line rule:line-length
  when: caddy_proxy_cloudflare_module.rc != 0
  changed_when: true
  notify: Restart caddy
- name: Install DNS LXC Caddy env
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /etc/caddy/env
    mode: '0600'
    owner: root
    group: caddy
  no_log: true
  notify: Restart caddy
- name: Install DNS LXC Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Ensure DNS LXC Caddy systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root
- name: Install DNS LXC Caddy systemd override
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Validate DNS LXC Caddy config
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
- name: Enable DNS LXC Caddy service
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false
- name: Flush DNS LXC Caddy restart before endpoint checks
  ansible.builtin.meta: flush_handlers
- name: Verify DNS LXC Caddy service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - caddy
  changed_when: false
  register: caddy_proxy_active
  retries: 6
  delay: 5
  until: caddy_proxy_active.rc == 0
- name: Verify DNS LXC Caddy upstream responds locally
  ansible.builtin.uri:
    url: "http://{{ caddy_upstream }}/"
    status_code:
      - 200
      - 302
    return_content: false
  register: caddy_proxy_upstream_check
  retries: 12
  delay: 5
  until: caddy_proxy_upstream_check.status in [200, 302]
- name: Verify DNS LXC HTTPS proxy route locally
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ (caddy_server_names if caddy_server_names is defined else [caddy_server_name]) | first }}:443:127.0.0.1"
      - "https://{{ (caddy_server_names if caddy_server_names is defined else [caddy_server_name]) | first }}/"
  changed_when: false
  register: caddy_proxy_https_check
  retries: 12
  delay: 5
  until: caddy_proxy_https_check.rc == 0
