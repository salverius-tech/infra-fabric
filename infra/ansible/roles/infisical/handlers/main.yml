---
- name: Restart infisical
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - cd /opt/infisical && set -a && . /etc/infisical/infisical.env && set +a && docker compose -f docker-compose.yml up -d
  changed_when: true
- name: Restart caddy
  ansible.builtin.systemd:
    name: caddy
    state: restarted
    daemon_reload: true
