---
- name: Restart infisical
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ infisical_vmid | string }}"
      - --
      - bash
      - -lc
      - cd /opt/infisical && set -a && . /etc/infisical/infisical.env && set +a && docker compose -f docker-compose.yml up -d
  changed_when: true

- name: Restart caddy
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ infisical_vmid | string }}"
      - --
      - systemctl
      - restart
      - caddy
  changed_when: true
