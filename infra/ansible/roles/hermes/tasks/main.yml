---
- name: Validate Hermes required variables
  ansible.builtin.assert:
    that:
      - hermes_vmid is defined
      - hermes_domain is defined
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_username is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_password_hash is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_secret is defined
    fail_msg: hermes_vmid, hermes_domain, caddy_email, caddy_cloudflare_api_token, and Hermes dashboard auth variables are required.
- name: Install Hermes OS dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; packages=\"build-essential ca-certificates caddy curl docker.io git gnupg jq openssh-client python3 python3-pip python3-venv rsync tar unzip xz-utils\"; missing=0; for package in ${packages}; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};\nfi; systemctl enable --now docker"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install Docker Compose CLI plugin in Hermes LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; version=\"{{ hermes_compose_version | default('5.3.0') }}\"; current=\"$(docker compose version --short 2>/dev/null || true)\"; if [[ \"${current}\" != \"${version}\" ]]; then\n  arch=\"$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')\";\n  install -d -m 0755 /usr/local/lib/docker/cli-plugins;\n  compose_url=\"https://github.com/docker/compose/releases/download/v${version}/docker-compose-linux-${arch}\";\n  curl -fsSL -o /usr/local/lib/docker/cli-plugins/docker-compose \"${compose_url}\";\n  chmod 0755 /usr/local/lib/docker/cli-plugins/docker-compose;\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install just command runner in Hermes LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; version=\"{{ hermes_just_version | default('1.55.1') }}\"; current=\"$(just --version 2>/dev/null | awk '{print $2}' || true)\"; if [[ \"${current}\" != \"${version}\" ]]; then\n  arch=\"$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')\";\n  target=\"${arch}-unknown-linux-musl\";\n  tmp=\"$(mktemp -d)\";\n  trap 'rm -rf \"${tmp}\"' EXIT;\n  curl -fsSL -o \"${tmp}/just.tar.gz\" \"https://github.com/casey/just/releases/download/${version}/just-${version}-${target}.tar.gz\";\n  tar -xzf \"${tmp}/just.tar.gz\" -C \"${tmp}\" just;\n  install -m 0755 \"${tmp}/just\" /usr/local/bin/just;\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Ensure Hermes directories exist
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "install -d -m 0755 /srv /var/www/hermes; if [[ ! -d {{ hermes_repo_path | default('/srv/homelab-infra') | quote }} ]]; then\n  install -d -m 0755 {{ hermes_repo_path | default('/srv/homelab-infra') | quote }};\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install Hermes landing page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/hermes/index.html
    mode: '0644'
    owner: root
    group: root
- name: Check whether Hermes Caddy has Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - caddy list-modules 2>/dev/null | grep -Fx dns.providers.cloudflare
  register: hermes_caddy_cloudflare_module
  changed_when: false
  failed_when: false
- name: Build Hermes Caddy with Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz -o /tmp/go.tar.gz && rm -rf /usr/local/go && tar -C /usr/local -xzf /tmp/go.tar.gz && PATH=/usr/local/go/bin:${PATH} GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest && PATH=/usr/local/go/bin:${PATH} /usr/local/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /tmp/caddy-cloudflare && install -m 0755 /tmp/caddy-cloudflare /usr/bin/caddy  # yamllint disable-line rule:line-length
  when: hermes_caddy_cloudflare_module.rc != 0
  changed_when: true
  notify: Restart caddy
- name: Install Hermes Caddy env
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /etc/caddy/env
    mode: '0600'
    owner: root
    group: caddy
  no_log: true
  notify: Restart caddy
- name: Install Hermes Agent CLI and dashboard dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; if ! command -v hermes >/dev/null 2>&1; then\n  curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s -- --skip-browser;\nfi; cd /usr/local/lib/hermes-agent; python3 -m venv --upgrade-deps venv; venv/bin/python -m pip install -e \".[web,pty]\""  # yamllint disable-line rule:line-length
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Install Hermes dashboard env
  ansible.builtin.template:
    src: hermes-dashboard.env.j2
    dest: /etc/hermes-dashboard.env
    mode: '0600'
    owner: root
    group: root
  when: hermes_dashboard_enabled | default(true) | bool
  no_log: true
- name: Install Hermes dashboard systemd unit
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: /etc/systemd/system/hermes-dashboard.service
    mode: '0644'
    owner: root
    group: root
  when: hermes_dashboard_enabled | default(true) | bool
- name: Enable Hermes dashboard service
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - systemctl daemon-reload && systemctl enable --now hermes-dashboard
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Install Hermes Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Ensure Hermes Caddy systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root
- name: Install Hermes Caddy systemd override
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Validate Hermes Caddy config
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
- name: Enable Hermes Caddy service
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false
- name: Flush Hermes service restarts before endpoint checks
  ansible.builtin.meta: flush_handlers
- name: Verify Hermes dashboard services are active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-dashboard
      - caddy
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Verify Hermes dashboard login page
  ansible.builtin.command:
    argv:
      - curl
      - -fsS
      - --max-time
      - '10'
      - http://127.0.0.1:{{ hermes_dashboard_port | default(9119) }}/login
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Verify Hermes Caddy basic-auth login rewrite
  ansible.builtin.command:
    argv:
      - curl
      - -kfsS
      - --max-time
      - '10'
      - --resolve
      - '{{ hermes_domain }}:443:127.0.0.1'
      - https://{{ hermes_domain }}/auth/login?provider=basic&next=%2F
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
