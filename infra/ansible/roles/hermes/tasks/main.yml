---
- name: Validate Hermes required variables
  ansible.builtin.assert:
    that:
      - hermes_vmid is defined
      - hermes_domain is defined
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or (hermes_dashboard_basic_auth_username | default('') | length) > 0
      - not (hermes_dashboard_enabled | default(true) | bool) or (hermes_dashboard_basic_auth_password_hash | default('') | length) > 0
      - not (hermes_dashboard_enabled | default(true) | bool) or (hermes_dashboard_basic_auth_secret | default('') | length) > 0
      - hermes_compression_threshold | default(0.75) | float >= 0.5
      - hermes_compression_threshold | default(0.75) | float <= 0.95
      - hermes_max_concurrent_children | default(5) | int >= 1
      - hermes_max_concurrent_children | default(5) | int <= 10
      - hermes_max_spawn_depth | default(2) | int >= 1
      - hermes_max_spawn_depth | default(2) | int <= 3
      - hermes_runtime_user | default('anvil') is match('^[a-z_][a-z0-9_-]{0,31}$')
      - hermes_runtime_user | default('anvil') != 'root'
      - hermes_node_version is defined
      - hermes_node_version is match('^[0-9]+[.][0-9]+[.][0-9]+$')
      - hermes_node_sha256_amd64 is defined
      - hermes_node_sha256_amd64 is match('^[0-9a-f]{64}$')
      - hermes_node_sha256_arm64 is defined
      - hermes_node_sha256_arm64 is match('^[0-9a-f]{64}$')
    fail_msg: >-
      hermes_vmid, hermes_domain, caddy_email, caddy_cloudflare_api_token,
      non-empty dashboard auth variables, sane Hermes tuning values, a
      non-root runtime user, and complete managed Node.js pins are required.
- name: Ensure Hermes runtime user exists
  ansible.builtin.user:
    name: "{{ hermes_runtime_user | default('anvil') }}"
    shell: /bin/bash
    create_home: true
    groups: users
    append: true

- name: Restore guarded private Hermes state during bootstrap
  ansible.builtin.include_tasks: bootstrap-state.yml

- name: Ensure Hermes runtime state directory exists
  ansible.builtin.file:
    path: "/home/{{ hermes_runtime_user | default('anvil') }}/.hermes"
    state: directory
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: '0700'

- name: Enable linger for Hermes runtime user services
  ansible.builtin.command:
    argv:
      - loginctl
      - enable-linger
      - "{{ hermes_runtime_user | default('anvil') }}"
  changed_when: false

- name: Ensure Hermes runtime SSH directory exists
  ansible.builtin.file:
    path: "/home/{{ hermes_runtime_user | default('anvil') }}/.ssh"
    state: directory
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: "0700"

- name: Install Hermes runtime authorized keys
  ansible.builtin.copy:
    dest: "/home/{{ hermes_runtime_user | default('anvil') }}/.ssh/authorized_keys"
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: "0600"
    content: "{{ (hermes_ssh_public_keys | default([])) | join('\n') }}{{ '\n' if (hermes_ssh_public_keys | default([]) | length) > 0 else '' }}"
  no_log: true


- name: Install Hermes OS dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; packages=\"build-essential ca-certificates caddy curl docker.io git gnupg jq openssh-client python3 python3-pip python3-venv rsync sudo tar unzip xz-utils\"; missing=0; for package in ${packages}; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};\nfi; systemctl enable --now docker"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Grant Hermes runtime user access to Docker
  ansible.builtin.user:
    name: "{{ hermes_runtime_user | default('anvil') }}"
    groups: docker
    append: true
  notify: Restart hermes gateway
- name: Install passwordless sudo policy for Hermes runtime user
  ansible.builtin.copy:
    dest: /etc/sudoers.d/hermes-runtime
    owner: root
    group: root
    mode: '0440'
    content: "{{ hermes_runtime_user | default('anvil') }} ALL=(ALL:ALL) NOPASSWD: ALL\n"  # public-safety: allow-secret
    validate: /usr/sbin/visudo -cf %s
  when: hermes_runtime_passwordless_sudo | default(false) | bool

- name: Remove Hermes runtime passwordless sudo policy when disabled
  ansible.builtin.file:
    path: /etc/sudoers.d/hermes-runtime
    state: absent
  when: not (hermes_runtime_passwordless_sudo | default(false) | bool)

- name: Install Docker Compose CLI plugin in Hermes LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; version=\"{{ hermes_compose_version | default('5.3.0') }}\"; current=\"$(docker compose version --short 2>/dev/null || true)\"; if [[ \"${current}\" != \"${version}\" ]]; then\n  arch=\"$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')\";\n  install -d -m 0755 /usr/local/lib/docker/cli-plugins;\n  compose_url=\"https://github.com/docker/compose/releases/download/v${version}/docker-compose-linux-${arch}\";\n  curl -fsSL -o /usr/local/lib/docker/cli-plugins/docker-compose \"${compose_url}\";\n  chmod 0755 /usr/local/lib/docker/cli-plugins/docker-compose;\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install just command runner in Hermes LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; version=\"{{ hermes_just_version | default('1.55.1') }}\"; current=\"$(just --version 2>/dev/null | awk '{print $2}' || true)\"; if [[ \"${current}\" != \"${version}\" ]]; then\n  arch=\"$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')\";\n  target=\"${arch}-unknown-linux-musl\";\n  tmp=\"$(mktemp -d)\";\n  trap 'rm -rf \"${tmp}\"' EXIT;\n  curl -fsSL -o \"${tmp}/just.tar.gz\" \"https://github.com/casey/just/releases/download/${version}/just-${version}-${target}.tar.gz\";\n  tar -xzf \"${tmp}/just.tar.gz\" -C \"${tmp}\" just;\n  install -m 0755 \"${tmp}/just\" /usr/local/bin/just;\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Ensure Hermes directories exist
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "install -d -m 0755 /srv /var/www/hermes; install -d -m 0755 -o {{ (hermes_runtime_user | default('anvil')) | quote }} -g {{ (hermes_runtime_user | default('anvil')) | quote }} {{ hermes_repo_path | default('/srv/homelab-infra') | quote }}"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install Hermes landing page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/hermes/index.html
    mode: '0644'
    owner: root
    group: root
- name: Check whether Hermes Caddy has Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - caddy list-modules 2>/dev/null | grep -Fx dns.providers.cloudflare
  register: hermes_caddy_cloudflare_module
  changed_when: false
  failed_when: false
- name: Build Hermes Caddy with Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz -o /tmp/go.tar.gz && rm -rf /usr/local/go && tar -C /usr/local -xzf /tmp/go.tar.gz && PATH=/usr/local/go/bin:${PATH} GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@v0.4.6 && PATH=/usr/local/go/bin:${PATH} /usr/local/bin/xcaddy build --with github.com/caddy-dns/cloudflare@v0.2.4 --output /tmp/caddy-cloudflare && install -m 0755 /tmp/caddy-cloudflare /usr/bin/caddy  # yamllint disable-line rule:line-length
  when: hermes_caddy_cloudflare_module.rc != 0
  changed_when: true
  notify: Restart caddy
- name: Install Hermes Caddy env
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /etc/caddy/env
    mode: '0600'
    owner: root
    group: caddy
  no_log: true
  notify: Restart caddy
- name: Select Hermes managed Node.js artifact
  ansible.builtin.set_fact:
    hermes_node_arch: "{{ 'x64' if ansible_architecture == 'x86_64' else 'arm64' }}"
    hermes_node_sha256: >-
      {{ hermes_node_sha256_amd64
         if ansible_architecture == 'x86_64'
         else hermes_node_sha256_arm64 }}
  when: ansible_architecture in ['x86_64', 'aarch64']

- name: Reject unsupported Hermes managed Node.js architecture
  ansible.builtin.assert:
    that:
      - ansible_architecture in ['x86_64', 'aarch64']
    fail_msg: Hermes managed Node.js supports only amd64 and arm64.

- name: Detect Hermes managed wheel runtime support
  ansible.builtin.set_fact:
    hermes_managed_runtime_supported: >-
      {{ ansible_distribution == 'Debian' and
         ansible_distribution_major_version == '13' and
         ansible_architecture == 'x86_64' and
         ansible_python.version.major == 3 and
         ansible_python.version.minor == 13 }}

- name: Reject unsupported Hermes runtime without explicit legacy opt-in
  ansible.builtin.assert:
    that:
      - hermes_managed_runtime_supported | bool or hermes_allow_legacy_runtime | default(false) | bool
    fail_msg: >-
      Hermes requires Debian 13 amd64 with Python 3.13 for the managed runtime.
      Set hermes_allow_legacy_runtime=true only for an explicitly accepted legacy installer exception.

- name: Install verified managed Node.js runtime
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - |
        set -euo pipefail
        version={{ hermes_node_version | quote }}
        arch={{ hermes_node_arch | quote }}
        sha256={{ hermes_node_sha256 | trim | quote }}
        root=/usr/local/lib/hermes-node
        release="${root}/releases/${version}-${sha256:0:12}"
        changed=0

        install -d -m 0755 "${root}/releases"
        if [[ ! -f "${release}/.artifact-sha256" ]]; then
          [[ ! -e "${release}" ]] || {
            echo "existing Hermes Node.js release is incomplete: ${release}" >&2
            exit 1
          }
          archive="$(mktemp)"
          staging="$(mktemp -d "${root}/releases/.${version}.XXXXXX")"
          trap 'rm -f "${archive}"; [[ -z "${staging:-}" ]] || rm -rf "${staging}"' EXIT
          curl -fsSL -o "${archive}" \
            "https://nodejs.org/dist/v${version}/node-v${version}-linux-${arch}.tar.xz"
          printf '%s  %s\n' "${sha256}" "${archive}" | sha256sum -c -
          tar -xJf "${archive}" --strip-components=1 -C "${staging}"
          [[ "$("${staging}/bin/node" --version)" = "v${version}" ]]
          chmod 0755 "${staging}"
          printf '%s\n' "${sha256}" > "${staging}/.artifact-sha256"
          mv "${staging}" "${release}"
          staging=
          changed=1
        fi

        [[ "$(cat "${release}/.artifact-sha256")" = "${sha256}" ]]
        if [[ "$(stat -c %a "${release}")" != 755 ]]; then
          chmod 0755 "${release}"
          changed=1
        fi
        current="$(readlink -f "${root}/current" 2>/dev/null || true)"
        if [[ "${current}" != "${release}" ]]; then
          ln -s "${release}" "${root}/.current-new"
          mv -Tf "${root}/.current-new" "${root}/current"
          changed=1
        fi
        [[ "$("${root}/current/bin/node" --version)" = "v${version}" ]]
        [[ "${changed}" -eq 0 ]] || echo changed
  register: hermes_node_install
  changed_when: "'changed' in hermes_node_install.stdout_lines"
  when: hermes_dashboard_enabled | default(true) | bool

- name: Install legacy Hermes Agent CLI and dashboard dependencies
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; if ! command -v hermes >/dev/null 2>&1; then\n  curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s -- --skip-browser;\nfi; pnpm_version=\"{{ hermes_pnpm_version | default('10.24.0') }}\"; if [[ \"$(pnpm --version 2>/dev/null || true)\" != \"${pnpm_version}\" ]]; then\n  tmp=\"$(mktemp -d)\"; trap 'rm -rf \"${tmp}\"' EXIT; curl -fsSL -o \"${tmp}/pnpm.tgz\" \"https://registry.npmjs.org/pnpm/-/pnpm-${pnpm_version}.tgz\"; rm -rf /usr/local/lib/pnpm; install -d -m 0755 /usr/local/lib/pnpm; tar -xzf \"${tmp}/pnpm.tgz\" -C /usr/local/lib/pnpm --strip-components=1; ln -sf /usr/local/lib/pnpm/bin/pnpm.cjs /usr/local/bin/pnpm;\nfi; cd /usr/local/lib/hermes-agent; python3 -m venv --upgrade-deps venv; venv/bin/python -m pip install -e \".[web,pty]\"; cd /usr/local/lib/hermes-agent/web; pnpm install --frozen-lockfile; pnpm run build"  # yamllint disable-line rule:line-length
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - not hermes_managed_runtime_supported | default(false) | bool
    - hermes_allow_legacy_runtime | default(false) | bool
  changed_when: false

- name: Ensure local libexec directory exists
  ansible.builtin.file:
    path: /usr/local/libexec
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool

- name: Install Hermes dashboard preflight
  ansible.builtin.template:
    src: hermes-dashboard-preflight.sh.j2
    dest: /usr/local/libexec/hermes-dashboard-preflight
    mode: '0755'
    owner: root
    group: root
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool
  notify: Restart hermes dashboard

- name: Install Hermes dashboard env
  ansible.builtin.template:
    src: hermes-dashboard.env.j2
    dest: /etc/hermes-dashboard.env
    mode: '0600'
    owner: root
    group: root
  when: hermes_dashboard_enabled | default(true) | bool
  no_log: true
  notify: Restart hermes dashboard

- name: Install Hermes dashboard systemd unit
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: /etc/systemd/system/hermes-dashboard.service
    mode: '0644'
    owner: root
    group: root
  when: hermes_dashboard_enabled | default(true) | bool
  notify: Restart hermes dashboard

- name: Install Hermes gateway systemd unit
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: /etc/systemd/system/hermes-gateway.service
    mode: '0644'
    owner: root
    group: root
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool
  notify: Restart hermes gateway

- name: Ensure Hermes TUI bundle directory exists
  ansible.builtin.file:
    path: /usr/local/lib/hermes-agent/tui/dist
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool

- name: Install managed Hermes Agent runtime
  ansible.builtin.include_tasks: managed-runtime.yml
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool

- name: Ensure homelab-infra operator plugin directory exists
  ansible.builtin.file:
    path: "/home/{{ hermes_runtime_user | default('anvil') }}/.hermes/plugins/homelab-infra-operator"
    state: directory
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: '0750'
  when: hermes_dashboard_enabled | default(true) | bool

- name: Install homelab-infra operator plugin manifest
  ansible.builtin.copy:
    src: homelab-infra-operator/plugin.yaml
    dest: "/home/{{ hermes_runtime_user | default('anvil') }}/.hermes/plugins/homelab-infra-operator/plugin.yaml"
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: '0644'
  when: hermes_dashboard_enabled | default(true) | bool
  notify:
    - Restart hermes dashboard
    - Restart hermes gateway

- name: Install homelab-infra operator plugin implementation
  ansible.builtin.copy:
    src: homelab-infra-operator/__init__.py
    dest: "/home/{{ hermes_runtime_user | default('anvil') }}/.hermes/plugins/homelab-infra-operator/__init__.py"
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: '0750'
  when: hermes_dashboard_enabled | default(true) | bool
  notify:
    - Restart hermes dashboard
    - Restart hermes gateway

- name: Install homelab-infra operator dashboard plugin
  ansible.builtin.copy:
    src: homelab-infra-operator/dashboard/
    dest: "/home/{{ hermes_runtime_user | default('anvil') }}/.hermes/plugins/homelab-infra-operator/dashboard/"
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: '0644'
    directory_mode: '0750'
  when: hermes_dashboard_enabled | default(true) | bool
  notify:
    - Restart hermes dashboard
    - Restart hermes gateway

- name: Enable homelab-infra operator plugin
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ hermes_runtime_user | default('anvil') }}"
      - --
      - env
      - "HERMES_HOME=/home/{{ hermes_runtime_user | default('anvil') }}/.hermes"
      - /usr/local/bin/hermes
      - plugins
      - enable
      - homelab-infra-operator
  register: hermes_operator_plugin_enabled
  changed_when: "'already enabled' not in (hermes_operator_plugin_enabled.stdout | lower)"
  when: hermes_dashboard_enabled | default(true) | bool
  notify:
    - Restart hermes dashboard
    - Restart hermes gateway

- name: Link Hermes dashboard TUI bundle to the active release
  ansible.builtin.file:
    src: /usr/local/lib/hermes-agent/venv/lib/python3.13/site-packages/hermes_cli/tui_dist/entry.js
    dest: /usr/local/lib/hermes-agent/tui/dist/entry.js
    state: link
    force: true
    owner: root
    group: root
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool
  notify: Restart hermes dashboard

- name: Verify active Hermes messaging imports
  ansible.builtin.command:
    argv:
      - /usr/local/lib/hermes-agent/venv/bin/python
      - -c
      - import aiohttp, discord, slack_bolt, telegram
  changed_when: false
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool

- name: Configure Hermes context compression and delegation limits
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ hermes_runtime_user | default('anvil') }}"
      - --
      - env
      - "HERMES_HOME=/home/{{ hermes_runtime_user | default('anvil') }}/.hermes"
      - hermes
      - config
      - set
      - "{{ item.key }}"
      - "{{ item.value | string }}"
  loop:
    - key: compression.enabled
      value: true
    - key: compression.threshold
      value: "{{ hermes_compression_threshold | default(0.75) }}"
    - key: delegation.max_concurrent_children
      value: "{{ hermes_max_concurrent_children | default(5) }}"
    - key: delegation.max_spawn_depth
      value: "{{ hermes_max_spawn_depth | default(2) }}"
  changed_when: false
  when: hermes_dashboard_enabled | default(true) | bool

- name: Configure Hermes SearXNG web-search backend
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ hermes_runtime_user | default('anvil') }}"
      - --
      - env
      - "HERMES_HOME=/home/{{ hermes_runtime_user | default('anvil') }}/.hermes"
      - hermes
      - config
      - set
      - web.search_backend
      - searxng
  changed_when: false
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_web_searxng_url | default('') | length > 0

- name: Record Hermes startup journal boundary
  ansible.builtin.command:
    argv:
      - date
      - +%s
  register: hermes_deployment_started_epoch
  changed_when: false

- name: Enable Hermes dashboard service
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - systemctl daemon-reload && systemctl enable --now hermes-dashboard
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Enable Hermes gateway service
  ansible.builtin.systemd:
    name: hermes-gateway
    enabled: true
    state: started
    daemon_reload: true
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool
- name: Install Hermes Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Ensure Hermes Caddy systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root
- name: Install Hermes Caddy systemd override
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Validate Hermes Caddy config
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
- name: Enable Hermes Caddy service
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false
- name: Flush Hermes service restarts before endpoint checks
  ansible.builtin.meta: flush_handlers
- name: Verify Hermes Caddy service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - caddy
  changed_when: false
  register: hermes_caddy_active
  retries: 6
  delay: 5
  until: hermes_caddy_active.rc == 0
- name: Configure optional Hermes Control companion stack
  ansible.builtin.include_role:
    name: hermes_control
  when: hermes_control_enabled | default(false) | bool
- name: Verify Hermes Control HTTPS health through Caddy
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_control_domain }}:443:127.0.0.1"
      - "https://{{ hermes_control_domain }}/health"
  changed_when: false
  when: hermes_control_enabled | default(false) | bool
  register: hermes_control_https_health
  retries: 12
  delay: 5
  until: hermes_control_https_health.rc == 0

- name: Verify Hermes Control HTTPS diagnostics through Caddy
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_control_domain }}:443:127.0.0.1"
      - -H
      - "Authorization: Bearer {{ hermes_control_api_token }}"
      - "https://{{ hermes_control_domain }}/diagnostics"
  changed_when: false
  no_log: true
  when: hermes_control_enabled | default(false) | bool
  register: hermes_control_https_diagnostics
  retries: 12
  delay: 5
  until: hermes_control_https_diagnostics.rc == 0

- name: Verify Hermes gateway service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-gateway
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_managed_runtime_supported | default(false) | bool
  changed_when: false
  register: hermes_gateway_active
  retries: 6
  delay: 5
  until: hermes_gateway_active.rc == 0
- name: Verify Hermes dashboard service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-dashboard
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
  register: hermes_dashboard_active
  retries: 6
  delay: 5
  until: hermes_dashboard_active.rc == 0
- name: Verify Hermes dashboard login page
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ hermes_dashboard_port | default(9119) }}/login"
    status_code: 200
    return_content: false
  when: hermes_dashboard_enabled | default(true) | bool
  register: hermes_dashboard_login_check
  retries: 12
  delay: 5
  until: hermes_dashboard_login_check.status == 200
- name: Verify Hermes Caddy basic-auth login rewrite
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_domain }}:443:127.0.0.1"
      - "https://{{ hermes_domain }}/auth/login?provider=basic&next=%2F"
  changed_when: false
  when: hermes_dashboard_enabled | default(true) | bool
  register: hermes_https_login_check
  retries: 12
  delay: 5
  until: hermes_https_login_check.rc == 0
- name: Reject Hermes startup journal errors
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        if journalctl --unit hermes-dashboard --unit hermes-gateway
        --since "@{{ hermes_deployment_started_epoch.stdout | trim }}"
        --no-pager --output=cat |
        grep -Eqi
        'HERMES_PREFLIGHT_|Chat unavailable|node not found|npm not found|Traceback \(most recent call last\)|ModuleNotFoundError|ImportError:';
        then echo 'Hermes startup journal contains a fatal readiness marker.' >&2; exit 1; fi
  changed_when: false
  when: hermes_dashboard_enabled | default(true) | bool
- name: Verify Hermes static HTTPS route locally
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_domain }}:443:127.0.0.1"
      - "https://{{ hermes_domain }}/"
  changed_when: false
  when: not (hermes_dashboard_enabled | default(true) | bool)
  register: hermes_static_https_check
  retries: 12
  delay: 5
  until: hermes_static_https_check.rc == 0
