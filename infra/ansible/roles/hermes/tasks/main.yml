---
- name: Validate Hermes required variables
  ansible.builtin.assert:
    that:
      - hermes_vmid is defined
      - hermes_domain is defined
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_username is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_password_hash is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_secret is defined
      - hermes_compression_threshold | default(0.75) | float >= 0.5
      - hermes_compression_threshold | default(0.75) | float <= 0.95
      - hermes_max_concurrent_children | default(5) | int >= 1
      - hermes_max_concurrent_children | default(5) | int <= 10
      - hermes_max_spawn_depth | default(2) | int >= 1
      - hermes_max_spawn_depth | default(2) | int <= 3
      - hermes_runtime_user | default('anvil') is match('^[a-z_][a-z0-9_-]{0,31}$')
      - hermes_runtime_user | default('anvil') != 'root'
    fail_msg: >-
      hermes_vmid, hermes_domain, caddy_email, caddy_cloudflare_api_token,
      dashboard auth variables, sane Hermes tuning values, and a non-root
      runtime user are required.
- name: Ensure Hermes runtime user exists
  ansible.builtin.user:
    name: "{{ hermes_runtime_user | default('anvil') }}"
    shell: /bin/bash
    create_home: true
    groups: users
    append: true

- name: Ensure Hermes runtime SSH directory exists
  ansible.builtin.file:
    path: "/home/{{ hermes_runtime_user | default('anvil') }}/.ssh"
    state: directory
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: "0700"

- name: Install Hermes runtime authorized keys
  ansible.builtin.copy:
    dest: "/home/{{ hermes_runtime_user | default('anvil') }}/.ssh/authorized_keys"
    owner: "{{ hermes_runtime_user | default('anvil') }}"
    group: "{{ hermes_runtime_user | default('anvil') }}"
    mode: "0600"
    content: "{{ (hermes_ssh_public_keys | default([])) | join('\n') }}{{ '\n' if (hermes_ssh_public_keys | default([]) | length) > 0 else '' }}"
  no_log: true

- name: Install Hermes OS dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; packages=\"build-essential ca-certificates caddy curl docker.io git gnupg jq openssh-client python3 python3-pip python3-venv rsync sudo tar unzip xz-utils\"; missing=0; for package in ${packages}; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};\nfi; systemctl enable --now docker"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install Docker Compose CLI plugin in Hermes LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; version=\"{{ hermes_compose_version | default('5.3.0') }}\"; current=\"$(docker compose version --short 2>/dev/null || true)\"; if [[ \"${current}\" != \"${version}\" ]]; then\n  arch=\"$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')\";\n  install -d -m 0755 /usr/local/lib/docker/cli-plugins;\n  compose_url=\"https://github.com/docker/compose/releases/download/v${version}/docker-compose-linux-${arch}\";\n  curl -fsSL -o /usr/local/lib/docker/cli-plugins/docker-compose \"${compose_url}\";\n  chmod 0755 /usr/local/lib/docker/cli-plugins/docker-compose;\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install just command runner in Hermes LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; version=\"{{ hermes_just_version | default('1.55.1') }}\"; current=\"$(just --version 2>/dev/null | awk '{print $2}' || true)\"; if [[ \"${current}\" != \"${version}\" ]]; then\n  arch=\"$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')\";\n  target=\"${arch}-unknown-linux-musl\";\n  tmp=\"$(mktemp -d)\";\n  trap 'rm -rf \"${tmp}\"' EXIT;\n  curl -fsSL -o \"${tmp}/just.tar.gz\" \"https://github.com/casey/just/releases/download/${version}/just-${version}-${target}.tar.gz\";\n  tar -xzf \"${tmp}/just.tar.gz\" -C \"${tmp}\" just;\n  install -m 0755 \"${tmp}/just\" /usr/local/bin/just;\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Ensure Hermes directories exist
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "install -d -m 0755 /srv /var/www/hermes; if [[ ! -d {{ hermes_repo_path | default('/srv/homelab-infra') | quote }} ]]; then\n  install -d -m 0755 -o {{ (hermes_runtime_user | default('anvil')) | quote }} -g {{ (hermes_runtime_user | default('anvil')) | quote }} {{ hermes_repo_path | default('/srv/homelab-infra') | quote }};\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install Hermes landing page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/hermes/index.html
    mode: '0644'
    owner: root
    group: root
- name: Check whether Hermes Caddy has Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - caddy list-modules 2>/dev/null | grep -Fx dns.providers.cloudflare
  register: hermes_caddy_cloudflare_module
  changed_when: false
  failed_when: false
- name: Build Hermes Caddy with Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz -o /tmp/go.tar.gz && rm -rf /usr/local/go && tar -C /usr/local -xzf /tmp/go.tar.gz && PATH=/usr/local/go/bin:${PATH} GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest && PATH=/usr/local/go/bin:${PATH} /usr/local/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /tmp/caddy-cloudflare && install -m 0755 /tmp/caddy-cloudflare /usr/bin/caddy  # yamllint disable-line rule:line-length
  when: hermes_caddy_cloudflare_module.rc != 0
  changed_when: true
  notify: Restart caddy
- name: Install Hermes Caddy env
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /etc/caddy/env
    mode: '0600'
    owner: root
    group: caddy
  no_log: true
- name: Install Hermes Agent CLI and dashboard dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; if ! command -v hermes >/dev/null 2>&1; then\n  curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s -- --skip-browser;\nfi; cd /usr/local/lib/hermes-agent; python3 -m venv --upgrade-deps venv; venv/bin/python -m pip install -e \".[web,pty]\""  # yamllint disable-line rule:line-length
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Configure Hermes context compression and delegation limits
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ hermes_runtime_user | default('anvil') }}"
      - --
      - env
      - "HERMES_HOME=/home/{{ hermes_runtime_user | default('anvil') }}/.hermes"
      - hermes
      - config
      - set
      - "{{ item.key }}"
      - "{{ item.value | string }}"
  loop:
    - key: compression.enabled
      value: true
    - key: compression.threshold
      value: "{{ hermes_compression_threshold | default(0.75) }}"
    - key: delegation.max_concurrent_children
      value: "{{ hermes_max_concurrent_children | default(5) }}"
    - key: delegation.max_spawn_depth
      value: "{{ hermes_max_spawn_depth | default(2) }}"
  changed_when: false
  when: hermes_dashboard_enabled | default(true) | bool

- name: Install Hermes dashboard env
  ansible.builtin.template:
    src: hermes-dashboard.env.j2
    dest: /etc/hermes-dashboard.env
    mode: '0600'
    owner: root
    group: root
  when: hermes_dashboard_enabled | default(true) | bool
  no_log: true
  notify: Restart hermes dashboard
- name: Install Hermes dashboard systemd unit
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: /etc/systemd/system/hermes-dashboard.service
    mode: '0644'
    owner: root
    group: root
  when: hermes_dashboard_enabled | default(true) | bool
  notify: Restart hermes dashboard
- name: Enable Hermes dashboard service
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - systemctl daemon-reload && systemctl enable --now hermes-dashboard
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
- name: Install Hermes Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
    owner: root
    group: root
- name: Install Hermes Caddy systemd override
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: '0644'
    owner: root
    group: root
- name: Ensure Hermes Caddy systemd override directory exists
  ansible.builtin.command:
    argv:
      - install
      - -d
      - -m
      - '0755'
      - /etc/systemd/system/caddy.service.d
  changed_when: false
- name: Validate Hermes Caddy config
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
- name: Enable Hermes Caddy service
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false
- name: Flush Hermes service restarts before endpoint checks
  ansible.builtin.meta: flush_handlers
- name: Verify Hermes Caddy service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - caddy
  changed_when: false
  register: hermes_caddy_active
  retries: 6
  delay: 5
  until: hermes_caddy_active.rc == 0
- name: Verify Hermes dashboard service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - hermes-dashboard
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
  register: hermes_dashboard_active
  retries: 6
  delay: 5
  until: hermes_dashboard_active.rc == 0
- name: Verify Hermes dashboard login page
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ hermes_dashboard_port | default(9119) }}/login"
    status_code: 200
    return_content: false
  when: hermes_dashboard_enabled | default(true) | bool
  register: hermes_dashboard_login_check
  retries: 12
  delay: 5
  until: hermes_dashboard_login_check.status == 200
- name: Verify Hermes Caddy basic-auth login rewrite
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_domain }}:443:127.0.0.1"
      - "https://{{ hermes_domain }}/auth/login?provider=basic&next=%2F"
  changed_when: false
  when: hermes_dashboard_enabled | default(true) | bool
  register: hermes_https_login_check
  retries: 12
  delay: 5
  until: hermes_https_login_check.rc == 0
- name: Verify Hermes static HTTPS route locally
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_domain }}:443:127.0.0.1"
      - "https://{{ hermes_domain }}/"
  changed_when: false
  when: not (hermes_dashboard_enabled | default(true) | bool)
  register: hermes_static_https_check
  retries: 12
  delay: 5
  until: hermes_static_https_check.rc == 0
