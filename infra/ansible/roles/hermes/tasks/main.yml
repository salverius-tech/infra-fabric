---
- name: Validate Hermes required variables
  ansible.builtin.assert:
    that:
      - hermes_vmid is defined
      - hermes_domain is defined
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_username is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_password_hash is defined
      - not (hermes_dashboard_enabled | default(true) | bool) or hermes_dashboard_basic_auth_secret is defined
    fail_msg: hermes_vmid, hermes_domain, caddy_email, caddy_cloudflare_api_token, and Hermes dashboard auth variables are required.

- name: Install Hermes OS dependencies in LXC
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        set -euo pipefail;
        packages="build-essential ca-certificates caddy curl docker.io git gnupg jq openssh-client python3 python3-pip python3-venv rsync tar unzip xz-utils";
        missing=0;
        for package in ${packages}; do
          dpkg-query -W "${package}" >/dev/null 2>&1 || missing=1;
        done;
        if [[ "${missing}" -eq 1 ]]; then
          DEBIAN_FRONTEND=noninteractive apt-get update;
          DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};
        fi;
        systemctl enable --now docker
  changed_when: false

- name: Install Docker Compose CLI plugin in Hermes LXC
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        set -euo pipefail;
        version="{{ hermes_compose_version | default('5.3.0') }}";
        current="$(docker compose version --short 2>/dev/null || true)";
        if [[ "${current}" != "${version}" ]]; then
          arch="$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')";
          install -d -m 0755 /usr/local/lib/docker/cli-plugins;
          curl -fsSL "https://github.com/docker/compose/releases/download/v${version}/docker-compose-linux-${arch}"
          -o /usr/local/lib/docker/cli-plugins/docker-compose;
          chmod 0755 /usr/local/lib/docker/cli-plugins/docker-compose;
        fi
  changed_when: false

- name: Install just command runner in Hermes LXC
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        set -euo pipefail;
        version="{{ hermes_just_version | default('1.55.1') }}";
        current="$(just --version 2>/dev/null | awk '{print $2}' || true)";
        if [[ "${current}" != "${version}" ]]; then
          arch="$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')";
          target="${arch}-unknown-linux-musl";
          tmp="$(mktemp -d)";
          trap 'rm -rf "${tmp}"' EXIT;
          curl -fsSL "https://github.com/casey/just/releases/download/${version}/just-${version}-${target}.tar.gz"
          -o "${tmp}/just.tar.gz";
          tar -xzf "${tmp}/just.tar.gz" -C "${tmp}" just;
          install -m 0755 "${tmp}/just" /usr/local/bin/just;
        fi
  changed_when: false

- name: Ensure Hermes directories exist
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        install -d -m 0755 /srv /var/www/hermes;
        if [[ ! -d {{ hermes_repo_path | default('/srv/homelab-infra') | quote }} ]]; then
          install -d -m 0755 {{ hermes_repo_path | default('/srv/homelab-infra') | quote }};
        fi
  changed_when: false

- name: Stage Hermes landing page on Proxmox host
  ansible.builtin.template:
    src: index.html.j2
    dest: /tmp/hermes-index.{{ hermes_vmid }}.html
    mode: "0644"

- name: Check Hermes landing page drift
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        local_hash="$(sha256sum /tmp/hermes-index.{{ hermes_vmid }}.html | awk '{print $1}')";
        remote_hash="$(pct exec {{ hermes_vmid | quote }} -- sha256sum /var/www/hermes/index.html 2>/dev/null | awk '{print $1}')";
        test "${local_hash}" = "${remote_hash}"
  register: hermes_index_drift
  changed_when: false
  failed_when: false

- name: Push Hermes landing page into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ hermes_vmid | string }}"
      - /tmp/hermes-index.{{ hermes_vmid }}.html
      - /var/www/hermes/index.html
  when: hermes_index_drift.rc != 0
  changed_when: true

- name: Check whether Hermes Caddy has Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - caddy list-modules 2>/dev/null | grep -Fx dns.providers.cloudflare
  register: hermes_caddy_cloudflare_module
  changed_when: false
  failed_when: false

- name: Build Hermes Caddy with Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz -o /tmp/go.tar.gz &&
        rm -rf /usr/local/go &&
        tar -C /usr/local -xzf /tmp/go.tar.gz &&
        PATH=/usr/local/go/bin:${PATH} GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest &&
        PATH=/usr/local/go/bin:${PATH} /usr/local/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /tmp/caddy-cloudflare &&
        install -m 0755 /tmp/caddy-cloudflare /usr/bin/caddy
  when: hermes_caddy_cloudflare_module.rc != 0
  notify: Restart caddy

- name: Stage Hermes Caddy env on Proxmox host
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /tmp/hermes-caddy.env.{{ hermes_vmid }}
    mode: "0600"
  no_log: true

- name: Check Hermes Caddy env drift
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        local_hash="$(sha256sum /tmp/hermes-caddy.env.{{ hermes_vmid }} | awk '{print $1}')";
        remote_hash="$(pct exec {{ hermes_vmid | quote }} -- sha256sum /etc/caddy/env 2>/dev/null | awk '{print $1}')";
        test "${local_hash}" = "${remote_hash}"
  register: hermes_caddy_env_drift
  changed_when: false
  failed_when: false
  no_log: true

- name: Push Hermes Caddy env into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ hermes_vmid | string }}"
      - /tmp/hermes-caddy.env.{{ hermes_vmid }}
      - /etc/caddy/env
  when: hermes_caddy_env_drift.rc != 0
  changed_when: true
  no_log: true
  notify: Restart caddy

- name: Secure Hermes Caddy env
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - chmod 0600 /etc/caddy/env && chown root:caddy /etc/caddy/env
  changed_when: false

- name: Install Hermes Agent CLI and dashboard dependencies in LXC
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        set -euo pipefail;
        if ! command -v hermes >/dev/null 2>&1; then
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s -- --skip-browser;
        fi;
        cd /usr/local/lib/hermes-agent;
        python3 -m venv --upgrade-deps venv;
        venv/bin/python -m pip install -e ".[web,pty]"
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false

- name: Stage Hermes dashboard env on Proxmox host
  ansible.builtin.template:
    src: hermes-dashboard.env.j2
    dest: /tmp/hermes-dashboard.env.{{ hermes_vmid }}
    mode: "0600"
  when: hermes_dashboard_enabled | default(true) | bool
  no_log: true

- name: Check Hermes dashboard env drift
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        local_hash="$(sha256sum /tmp/hermes-dashboard.env.{{ hermes_vmid }} | awk '{print $1}')";
        remote_hash="$(pct exec {{ hermes_vmid | quote }} -- sha256sum /etc/hermes-dashboard.env 2>/dev/null | awk '{print $1}')";
        test "${local_hash}" = "${remote_hash}"
  register: hermes_dashboard_env_drift
  changed_when: false
  failed_when: false
  when: hermes_dashboard_enabled | default(true) | bool
  no_log: true

- name: Push Hermes dashboard env into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ hermes_vmid | string }}"
      - /tmp/hermes-dashboard.env.{{ hermes_vmid }}
      - /etc/hermes-dashboard.env
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_dashboard_env_drift.rc != 0
  changed_when: true
  no_log: true
  notify: Restart hermes dashboard

- name: Secure Hermes dashboard env
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - chmod 0600 /etc/hermes-dashboard.env && chown root:root /etc/hermes-dashboard.env
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
  no_log: true

- name: Stage Hermes dashboard systemd unit on Proxmox host
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: /tmp/hermes-dashboard.service.{{ hermes_vmid }}
    mode: "0644"
  when: hermes_dashboard_enabled | default(true) | bool

- name: Check Hermes dashboard systemd unit drift
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        local_hash="$(sha256sum /tmp/hermes-dashboard.service.{{ hermes_vmid }} | awk '{print $1}')";
        remote_hash="$(pct exec {{ hermes_vmid | quote }} -- sha256sum /etc/systemd/system/hermes-dashboard.service 2>/dev/null | awk '{print $1}')";
        test "${local_hash}" = "${remote_hash}"
  register: hermes_dashboard_unit_drift
  changed_when: false
  failed_when: false
  when: hermes_dashboard_enabled | default(true) | bool

- name: Push Hermes dashboard systemd unit into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ hermes_vmid | string }}"
      - /tmp/hermes-dashboard.service.{{ hermes_vmid }}
      - /etc/systemd/system/hermes-dashboard.service
  when:
    - hermes_dashboard_enabled | default(true) | bool
    - hermes_dashboard_unit_drift.rc != 0
  changed_when: true
  notify: Restart hermes dashboard

- name: Enable Hermes dashboard service
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - systemctl daemon-reload && systemctl enable --now hermes-dashboard
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false

- name: Stage Hermes Caddyfile on Proxmox host
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /tmp/hermes-Caddyfile.{{ hermes_vmid }}
    mode: "0644"

- name: Check Hermes Caddyfile drift
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        local_hash="$(sha256sum /tmp/hermes-Caddyfile.{{ hermes_vmid }} | awk '{print $1}')";
        remote_hash="$(pct exec {{ hermes_vmid | quote }} -- sha256sum /etc/caddy/Caddyfile 2>/dev/null | awk '{print $1}')";
        test "${local_hash}" = "${remote_hash}"
  register: hermes_caddyfile_drift
  changed_when: false
  failed_when: false

- name: Push Hermes Caddyfile into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ hermes_vmid | string }}"
      - /tmp/hermes-Caddyfile.{{ hermes_vmid }}
      - /etc/caddy/Caddyfile
  when: hermes_caddyfile_drift.rc != 0
  changed_when: true
  notify: Restart caddy

- name: Stage Hermes Caddy systemd override on Proxmox host
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /tmp/hermes-caddy-override.conf.{{ hermes_vmid }}
    mode: "0644"

- name: Ensure Hermes Caddy systemd override directory exists
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - install
      - -d
      - -m
      - "0755"
      - /etc/systemd/system/caddy.service.d
  changed_when: false

- name: Check Hermes Caddy systemd override drift
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        local_hash="$(sha256sum /tmp/hermes-caddy-override.conf.{{ hermes_vmid }} | awk '{print $1}')";
        remote_hash="$(pct exec {{ hermes_vmid | quote }} -- sha256sum /etc/systemd/system/caddy.service.d/override.conf 2>/dev/null | awk '{print $1}')";
        test "${local_hash}" = "${remote_hash}"
  register: hermes_caddy_override_drift
  changed_when: false
  failed_when: false

- name: Push Hermes Caddy systemd override into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ hermes_vmid | string }}"
      - /tmp/hermes-caddy-override.conf.{{ hermes_vmid }}
      - /etc/systemd/system/caddy.service.d/override.conf
  when: hermes_caddy_override_drift.rc != 0
  changed_when: true
  notify: Restart caddy

- name: Validate Hermes Caddy config
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false

- name: Enable Hermes Caddy service
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false

- name: Flush Hermes service restarts before endpoint checks
  ansible.builtin.meta: flush_handlers

- name: Verify Hermes dashboard services are active
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - systemctl
      - is-active
      - hermes-dashboard
      - caddy
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false

- name: Verify Hermes dashboard login page
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - curl
      - -fsS
      - --max-time
      - "10"
      - http://127.0.0.1:{{ hermes_dashboard_port | default(9119) }}/login
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false

- name: Verify Hermes Caddy basic-auth login rewrite
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - curl
      - -kfsS
      - --max-time
      - "10"
      - --resolve
      - "{{ hermes_domain }}:443:127.0.0.1"
      - "https://{{ hermes_domain }}/auth/login?provider=basic&next=%2F"
  when: hermes_dashboard_enabled | default(true) | bool
  changed_when: false
