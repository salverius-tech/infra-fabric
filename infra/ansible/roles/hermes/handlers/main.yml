---
- name: Restart hermes dashboard
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - systemctl
      - restart
      - hermes-dashboard
  changed_when: true

- name: Restart caddy
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ hermes_vmid | string }}"
      - --
      - systemctl
      - restart
      - caddy
  changed_when: true
