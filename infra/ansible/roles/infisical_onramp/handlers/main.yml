---
- name: Restart infisical onramp
  become: true
  become_user: "{{ onramp_host_deploy_user }}"
  ansible.builtin.systemd_service:
    name: infisical-onramp.service
    scope: user
    state: restarted
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ infisical_onramp_deploy_user_uid.stdout | trim }}"

- name: Restart caddy
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted
    daemon_reload: true
