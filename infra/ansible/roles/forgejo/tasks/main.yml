---
- name: Validate Forgejo required variables
  ansible.builtin.assert:
    that:
      - forgejo_domain is defined
      - forgejo_version is defined
    fail_msg: forgejo_domain and forgejo_version are required.
- name: Install Forgejo OS dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; packages=\"ca-certificates curl git git-lfs openssh-server sqlite3\"; missing=0; for package in ${packages}; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};\nfi"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Enable Git LFS system hooks
  ansible.builtin.command:
    argv:
      - git
      - lfs
      - install
      - --system
  changed_when: false
- name: Ensure git user exists
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - if ! id git >/dev/null 2>&1; then adduser --system --shell /bin/bash --gecos 'Git Version Control' --group --disabled-password --home /var/lib/forgejo git; fi  # yamllint disable-line rule:line-length
  changed_when: false
- name: Configure Forgejo guest-managed storage
  ansible.builtin.include_tasks: guest-storage.yml
  vars:
    storage_mount: "{{ forgejo_storage.data }}"
  when:
    - forgejo_storage is defined
    - forgejo_storage.data is defined
    - forgejo_storage.data.type in ['guest_nfs', 'guest_cifs']
- name: Ensure Forgejo directories exist
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - install -d -m 0750 -o git -g git /var/lib/forgejo /var/lib/forgejo/custom /var/lib/forgejo/data /var/lib/forgejo/log && install -d -m 0770 -o root -g git /etc/forgejo  # yamllint disable-line rule:line-length
  changed_when: false
- name: Check installed Forgejo version
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - /usr/local/bin/forgejo --version 2>/dev/null | grep -oE '[0-9]+[.][0-9]+[.][0-9]+' | head -n1
  register: forgejo_installed_version
  changed_when: false
  failed_when: false
- name: Install requested Forgejo binary
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - base={{ forgejo_download_base | default('https://code.forgejo.org/forgejo/forgejo/releases/download') }} && curl -fsSL -o /usr/local/bin/forgejo "$base/v{{ forgejo_version }}/forgejo-{{ forgejo_version }}-linux-amd64" && chmod 0755 /usr/local/bin/forgejo  # yamllint disable-line rule:line-length
  when: forgejo_installed_version.stdout | trim != forgejo_version
  notify: Restart forgejo
- name: Install Forgejo systemd service
  ansible.builtin.template:
    src: forgejo.service.j2
    dest: /etc/systemd/system/forgejo.service
    mode: '0644'
    owner: root
    group: root
- name: Check Forgejo app.ini presence
  ansible.builtin.command:
    argv:
      - test
      - -f
      - /etc/forgejo/app.ini
  register: forgejo_app_ini_check
  changed_when: false
  failed_when: false
- name: Install initial Forgejo app.ini
  ansible.builtin.template:
    src: app.ini.j2
    dest: /etc/forgejo/app.ini
    mode: '0640'
    owner: root
    group: git
  when: forgejo_write_initial_config | default(false) | bool or forgejo_app_ini_check.rc != 0
  no_log: true
- name: Configure Forgejo Actions settings
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; file=/etc/forgejo/app.ini; tmp=\"$(mktemp)\"; awk -v enabled=\"true\" -v url=\"{{ forgejo_actions_default_url | default('https://data.forgejo.org') }}\" ' function emit_missing() {\n  if (in_actions) {\n    if (!seen_enabled) print \"ENABLED = \" enabled;\n    if (!seen_url) print \"DEFAULT_ACTIONS_URL = \" url;\n  }\n} /^\\[.*\\]$/ {\n  if (in_actions) emit_missing();\n  in_actions = ($0 == \"[actions]\");\n  if (in_actions) {\n    seen_actions = 1;\n    seen_enabled = 0;\n    seen_url = 0;\n  }\n  print;\n  next;\n} in_actions && /^[[:space:]]*ENABLED[[:space:]]*=/ {\n  print \"ENABLED = \" enabled;\n  seen_enabled = 1;\n  next;\n} in_actions && /^[[:space:]]*DEFAULT_ACTIONS_URL[[:space:]]*=/ {\n  print \"DEFAULT_ACTIONS_URL = \" url;\n  seen_url = 1;\n  next;\n} { print } END {\n  if (in_actions) emit_missing();\n  if (!seen_actions) {\n    print \"\";\n    print \"[actions]\";\n    print \"ENABLED = \" enabled;\n    print \"DEFAULT_ACTIONS_URL = \" url;\n  }\n} ' \"${file}\" > \"${tmp}\"; if cmp -s \"${file}\" \"${tmp}\"; then\n  rm -f \"${tmp}\";\n  exit 0;\nfi; cat \"${tmp}\" > \"${file}\"; rm -f \"${tmp}\"; chown root:git \"${file}\"; chmod 0640 \"${file}\"; exit 1"  # yamllint disable-line rule:line-length
  register: forgejo_actions_settings
  changed_when: forgejo_actions_settings.rc == 1
  failed_when: forgejo_actions_settings.rc not in [0, 1]
  notify: Restart forgejo
  when: forgejo_actions_enabled | default(true) | bool
- name: Install Forgejo SSH integration config
  ansible.builtin.template:
    src: forgejo-sshd.conf.j2
    dest: /etc/ssh/sshd_config.d/forgejo.conf
    mode: '0644'
    owner: root
    group: root
  when: forgejo_configure_system_ssh | default(true) | bool
- name: Configure Caddy on Forgejo LXC
  ansible.builtin.include_tasks: caddy.yml
  when: forgejo_enable_caddy | default(false) | bool
- name: Enable Forgejo service
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - forgejo
  changed_when: false
- name: Flush Forgejo service restarts before endpoint checks
  ansible.builtin.meta: flush_handlers
- name: Verify Forgejo service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - forgejo
  changed_when: false
  register: forgejo_active
  retries: 6
  delay: 5
  until: forgejo_active.rc == 0
- name: Verify Forgejo health endpoint on loopback
  ansible.builtin.uri:
    url: http://127.0.0.1:3000/api/healthz
    status_code: 200
    return_content: false
  register: forgejo_health_check
  retries: 12
  delay: 5
  until: forgejo_health_check.status == 200
- name: Verify Forgejo Caddy service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - caddy
  changed_when: false
  register: forgejo_caddy_active
  retries: 6
  delay: 5
  until: forgejo_caddy_active.rc == 0
  when: forgejo_enable_caddy | default(false) | bool
- name: Verify Forgejo HTTPS health route locally
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ forgejo_domain }}:443:127.0.0.1"
      - "https://{{ forgejo_domain }}/api/healthz"
  changed_when: false
  register: forgejo_https_health_check
  retries: 12
  delay: 5
  until: forgejo_https_health_check.rc == 0
  when: forgejo_enable_caddy | default(false) | bool
