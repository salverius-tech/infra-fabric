---
- name: Validate Forgejo Caddy variables
  ansible.builtin.assert:
    that:
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
    fail_msg: caddy_email and caddy_cloudflare_api_token are required when forgejo_enable_caddy is true.

- name: Install Caddy build dependencies in Forgejo LXC
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - bash
      - -lc
      - DEBIAN_FRONTEND=noninteractive apt-get install -y caddy ca-certificates curl
  changed_when: false

- name: Check whether Caddy has Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - bash
      - -lc
      - caddy list-modules 2>/dev/null | grep -Fx dns.providers.cloudflare
  register: forgejo_caddy_cloudflare_module
  changed_when: false
  failed_when: false

- name: Build Caddy with Cloudflare DNS module
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz -o /tmp/go.tar.gz &&
        rm -rf /usr/local/go &&
        tar -C /usr/local -xzf /tmp/go.tar.gz &&
        PATH=/usr/local/go/bin:${PATH} GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest &&
        PATH=/usr/local/go/bin:${PATH} /usr/local/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /tmp/caddy-cloudflare &&
        install -m 0755 /tmp/caddy-cloudflare /usr/bin/caddy
  when: forgejo_caddy_cloudflare_module.rc != 0
  notify: Restart caddy

- name: Stage Forgejo Caddy env on Proxmox host
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /tmp/forgejo-caddy.env.{{ forgejo_vmid }}
    mode: "0600"
  no_log: true

- name: Push Forgejo Caddy env into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ forgejo_vmid | string }}"
      - /tmp/forgejo-caddy.env.{{ forgejo_vmid }}
      - /etc/caddy/env
  no_log: true
  notify: Restart caddy

- name: Secure Forgejo Caddy env
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - bash
      - -lc
      - chmod 0600 /etc/caddy/env && chown root:caddy /etc/caddy/env
  changed_when: false

- name: Stage Forgejo Caddyfile on Proxmox host
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /tmp/forgejo-Caddyfile.{{ forgejo_vmid }}
    mode: "0644"

- name: Push Forgejo Caddyfile into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ forgejo_vmid | string }}"
      - /tmp/forgejo-Caddyfile.{{ forgejo_vmid }}
      - /etc/caddy/Caddyfile
  notify: Restart caddy

- name: Stage Forgejo Caddy systemd override on Proxmox host
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /tmp/forgejo-caddy-override.conf.{{ forgejo_vmid }}
    mode: "0644"

- name: Ensure Forgejo Caddy systemd override directory exists
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - install
      - -d
      - -m
      - "0755"
      - /etc/systemd/system/caddy.service.d
  changed_when: false

- name: Push Forgejo Caddy systemd override into LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ forgejo_vmid | string }}"
      - /tmp/forgejo-caddy-override.conf.{{ forgejo_vmid }}
      - /etc/systemd/system/caddy.service.d/override.conf
  notify: Restart caddy

- name: Validate Forgejo Caddy config
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy fmt --overwrite /etc/caddy/Caddyfile && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false

- name: Enable Forgejo Caddy service
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false
