---
- name: Validate SSH proxy item
  ansible.builtin.assert:
    that:
      - item.unit_name is defined
      - item.listen_port is defined
      - item.upstream is defined
    fail_msg: Each caddy_ssh_proxies item needs unit_name, listen_port, and upstream.

- name: Stage SSH proxy socket on Proxmox host
  ansible.builtin.template:
    src: ssh-proxy.socket.j2
    dest: /tmp/{{ item.unit_name }}.socket.{{ technitium_vmid }}
    mode: "0644"

- name: Push SSH proxy socket into DNS LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ technitium_vmid | string }}"
      - /tmp/{{ item.unit_name }}.socket.{{ technitium_vmid }}
      - /etc/systemd/system/{{ item.unit_name }}.socket

- name: Stage SSH proxy service on Proxmox host
  ansible.builtin.template:
    src: ssh-proxy.service.j2
    dest: /tmp/{{ item.unit_name }}.service.{{ technitium_vmid }}
    mode: "0644"

- name: Push SSH proxy service into DNS LXC
  ansible.builtin.command:
    argv:
      - pct
      - push
      - "{{ technitium_vmid | string }}"
      - /tmp/{{ item.unit_name }}.service.{{ technitium_vmid }}
      - /etc/systemd/system/{{ item.unit_name }}.service

- name: Enable SSH proxy socket
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ technitium_vmid | string }}"
      - --
      - bash
      - -lc
      - systemctl daemon-reload && systemctl enable --now {{ item.unit_name }}.socket && systemctl restart {{ item.unit_name }}.socket
