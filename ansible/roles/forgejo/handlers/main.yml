---
- name: Restart forgejo
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - systemctl
      - restart
      - forgejo
  changed_when: true

- name: Restart ssh
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - systemctl
      - restart
      - ssh
  changed_when: true

- name: Restart caddy
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ forgejo_vmid | string }}"
      - --
      - systemctl
      - restart
      - caddy
  changed_when: true
