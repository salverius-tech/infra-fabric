---
- name: Remove legacy Forgejo proxying from DNS LXC
  hosts: pve
  gather_facts: false
  tasks:
    - name: Disable old Forgejo SSH proxy socket if present
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ technitium_vmid | string }}"
          - --
          - bash
          - -lc
          - >-
            systemctl disable --now forgejo-ssh-proxy.socket forgejo-ssh-proxy.service
            >/dev/null 2>&1 || true
      changed_when: false

    - name: Remove old Forgejo SSH proxy unit files
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ technitium_vmid | string }}"
          - --
          - bash
          - -lc
          - >-
            rm -f /etc/systemd/system/forgejo-ssh-proxy.socket
            /etc/systemd/system/forgejo-ssh-proxy.service && systemctl daemon-reload
      changed_when: false
