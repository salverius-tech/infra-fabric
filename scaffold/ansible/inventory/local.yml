---
all:
  hosts:
    pve:
      ansible_host: proxmox.example.internal
      ansible_user: root
  vars:
    technitium_vmid: 106
    technitium_discovery_version: "15.2.0"
    technitium_portable_sha256: 2e39fb8d0718475790cc025e083a1bcfd837a5e79e4a1d0ed775881bd90287ef
    forgejo_vmid: 107
    forgejo_domain: git.example.internal
    forgejo_version: "12.0.4"
    forgejo_root_url: "https://git.example.internal/"
    forgejo_ssh_port: 22
    forgejo_enable_caddy: true
    forgejo_configure_system_ssh: true
    forgejo_write_initial_config: false
    forgejo_runtime:
      type: lxc
    forgejo_secret_key: "{{ lookup('env', 'FORGEJO_SECRET_KEY') }}"
    forgejo_internal_token: "{{ lookup('env', 'FORGEJO_INTERNAL_TOKEN') }}"
    forgejo_oauth2_jwt_secret: "{{ lookup('env', 'FORGEJO_OAUTH2_JWT_SECRET') }}"
    forgejo_lfs_jwt_secret: "{{ lookup('env', 'FORGEJO_LFS_JWT_SECRET') }}"
    forgejo_postgres_password: "{{ lookup('env', 'FORGEJO_POSTGRES_PASSWORD') }}"
    forgejo_bootstrap_enabled: true
    forgejo_bootstrap_admin_username: "{{ lookup('env', 'FORGEJO_ADMIN_USERNAME') }}"
    forgejo_bootstrap_admin_email: "{{ lookup('env', 'FORGEJO_ADMIN_EMAIL') }}"
    forgejo_bootstrap_admin_password: "{{ lookup('env', 'FORGEJO_ADMIN_PASSWORD') }}"
    forgejo_bootstrap_owner_email: "{{ lookup('env', 'FORGEJO_REPO_OWNER_EMAIL') }}"
    forgejo_bootstrap_owner_password: "{{ lookup('env', 'FORGEJO_REPO_OWNER_PASSWORD') }}"
    forgejo_actions_enabled: true
    forgejo_actions_default_url: https://data.forgejo.org
    forgejo_runner_vmid: 109
    forgejo_runner_version: "12.7.3"
    forgejo_runner_url: "https://git.example.internal/"
    forgejo_runner_name: homelab-deploy
    forgejo_runner_scope: owner/homelab-infra-values
    forgejo_runner_registration_secret: "{{ lookup('env', 'FORGEJO_RUNNER_REGISTRATION_SECRET') }}"
    forgejo_runner_label: homelab-deploy
    forgejo_runner_labels:
      - homelab-deploy:host
    forgejo_runner_dns_servers: [192.0.2.1]
    forgejo_runner_hosts:
      - name: git.example.internal
        address: 192.0.2.62
    infisical_vmid: 110
    infisical_domain: infisical.example.internal
    infisical_version: latest
    infisical_data_dir: /var/lib/infisical
    infisical_encryption_key: "{{ lookup('env', 'INFISICAL_ENCRYPTION_KEY') }}"
    infisical_auth_secret: "{{ lookup('env', 'INFISICAL_AUTH_SECRET') }}"
    infisical_postgres_user: infisical
    infisical_postgres_db: infisical
    infisical_postgres_password: "{{ lookup('env', 'INFISICAL_POSTGRES_PASSWORD') }}"
    hermes_vmid: 111
    hermes_domain: hermes.example.internal
    hermes_repo_path: /srv/homelab-infra
    hermes_discovery_version: "0.18.0"
    hermes_discovery_tag: "v2026.7.1"
    hermes_discovery_commit: 7c1a029553d87c43ecff8a3821336bc95872213b
    hermes_discovery_wheel_sha256: bf75c02d59f7c464cd0d85026fb7ee2e6bb15f003beccab3442b572f1ae1fd37
    hermes_node_version: "22.23.1"
    hermes_node_sha256_amd64: 9749e988f437343b7fa832c69ded82a312e41a03116d766797ac14f6f9eee578
    hermes_node_sha256_arm64: 543fa39e57d4c07855939459a323f4deb9a79dd1bb45e6e99458b0f2de10db8d
    hermes_runtime_passwordless_sudo: false
    hermes_allow_legacy_runtime: false
    hermes_compression_threshold: 0.75
    hermes_max_concurrent_children: 5
    hermes_max_spawn_depth: 2
    hermes_dashboard_enabled: true
    hermes_dashboard_port: 9119
    hermes_dashboard_host: 127.0.0.1
    hermes_dashboard_basic_auth_username: admin
    hermes_dashboard_basic_auth_password_hash: "{{ lookup('env', 'HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH') }}"
    hermes_dashboard_basic_auth_secret: "{{ lookup('env', 'HERMES_DASHBOARD_BASIC_AUTH_SECRET') }}"
    hermes_web_searxng_url: "{{ lookup('env', 'HERMES_WEB_SEARXNG_URL') }}"
    searxng_server_name: searxng.apps.example.net
    searxng_public_url: https://searxng.apps.example.net
    searxng_secret_key: "{{ lookup('env', 'SEARXNG_SECRET_KEY') }}"
    searxng_container_image: docker.io/searxng/searxng:latest
    searxng_container_port: 8080
    searxng_bind_address: 127.0.0.1
    searxng_instance_name: Homelab SearXNG
    tailscale_client_enabled: false
    tailscale_client_vmid: 108
    tailscale_client_restore_backup: false
    tailscale_client_backup_archive: ../../values/backups/tailscale-client/example/client-config-full.tgz
    tailscale_client_enable_ip_forwarding: true
    tailscale_client_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"
    tailscale_client_up_args: []

    # Shared Caddy ACME settings used by each service-local Caddy instance.
    # Keep the token secret in values/.env as CF_DNS_API_TOKEN.
    caddy_email: admin@example.internal
    caddy_cloudflare_api_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"

    # Technitium DNS UI Caddy proxy only. Other services use their own
    # service-specific domain variables such as forgejo_domain, infisical_domain,
    # hermes_domain, and searxng_server_name.
    caddy_server_name: dns.example.internal
    caddy_server_names:
      - dns.example.internal
      - technitium.example.internal
    caddy_upstream: 127.0.0.1:5380
    caddy_extra_vhosts: []
